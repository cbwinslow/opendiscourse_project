services:
  redis:
    image: redis:7-alpine
    container_name: opendiscourse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendiscourse-celery-worker
    command: celery -A opendiscourse.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://cbwinslow:password@host.docker.internal:5432/opendiscourse}
      - REDIS_URL=redis://redis:6379/0
      - CONGRESS_GOV_API_KEY=${CONGRESS_GOV_API_KEY}
      - GOVINFO_API_KEY=${GOVINFO_API_KEY}
      - FEC_API_KEY=${FEC_API_KEY}
      - OPENSECRETS_API_KEY=${OPENSECRETS_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendiscourse-celery-beat
    command: celery -A opendiscourse.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://cbwinslow:password@host.docker.internal:5432/opendiscourse}
      - REDIS_URL=redis://redis:6379/0
      - CONGRESS_GOV_API_KEY=${CONGRESS_GOV_API_KEY}
      - GOVINFO_API_KEY=${GOVINFO_API_KEY}
      - FEC_API_KEY=${FEC_API_KEY}
      - OPENSECRETS_API_KEY=${OPENSECRETS_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendiscourse-api
    command: uvicorn opendiscourse.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://cbwinslow:password@host.docker.internal:5432/opendiscourse}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendiscourse-mcp
    command: python -m opendiscourse.mcp_server.server
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://cbwinslow:password@host.docker.internal:5432/opendiscourse}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src:/app/src

volumes:
  redis_data:
